baseURL = 'https://khomkrit.cc/'
languageCode = 'en-us'
theme = 'PaperMod'
defaultContentLanguage = "th"
defaultContentLanguageInSubdir = false

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = true        # ปรับเป็น true ถ้าอยากให้มี "เลขบรรทัด" โชว์ด้านหน้าโค้ด
    style = "dracula"
    noClasses = false  # <--- บรรทัดนี้สำคัญมาก! บังคับให้ Hugo ใช้ CSS Class แทนการฝังสีลงไปดื้อๆ"     # <--- เปลี่ยนชื่อธีมสีตรงนี้ครับ
# ==========================================
# 1. การตั้งค่า Params พื้นฐาน (ใช้ร่วมกันทุกภาษา)
# ==========================================
[params]
  env = 'production'
  description = 'Senior Systems Engineer focusing on Rust, Kubernetes, and Scalable Architecture'
  author = 'Khomkrit'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false

[params.cover]
    hidden = false
    hiddenInList = false    # ซ่อนรูปในหน้ารวมบทความ (เพื่อให้ดูคลีน)
    hiddenInSingle = false# โชว์รูประดับบนสุดในหน้าอ่านบทความ

[params.label]
    text = "Khomkrit.cc"

  # --- ตั้งค่าส่วนกลางของ Profile Mode (รูปและปุ่มกด) ---
  [params.profileMode]
    enabled = true
    # imageUrl = "<ลิงก์รูปโปรไฟล์ของคุณ>"
    # imageWidth = 150
    # imageHeight = 150



# ==========================================
# 2. การตั้งค่าแยกตามภาษา (Multilingual)
# ==========================================
[languages]

  # ---------------- ภาษาอังกฤษ (Default) ----------------
  [languages.en]
    languageName = "English"
    title = "Khomkrit | Cloud & Infrastructure Architect" # Title บนแท็บ Browser
    weight = 1

    # ข้อความตรงกลางหน้าจอสำหรับภาษาอังกฤษ
    [languages.en.params.profileMode]
      title = "Khomkrit | Cloud & Infrastructure Architect"
      subtitle = "Staff Engineer / Consultant specializing in high-performance Backend and Enterprise Infrastructure."

    [[languages.en.menu.main]]
      name = "Case Studies"
      url = "/case-studies/"
      weight = 1

    [[languages.en.params.profileMode.buttons]]
        name = "View Case Studies"
        url = "/case-studies/"
    [[languages.en.params.profileMode.buttons]]
        name = "Blogs"
        url = "/blogs/"
    [[languages.en.params.profileMode.buttons]]
        name = "Github"
        url = "https://github.com/azimuth3d"

  # ---------------- ภาษาไทย ----------------
  [languages.th]
    languageName = "Thai"
    title = "Khomkrit | Cloud & Infrastructure Architect" # Title บนแท็บ Browser
    weight = 1

    # ข้อความตรงกลางหน้าจอสำหรับภาษาอังกฤษ
    [languages.th.params.profileMode]
      title = "Khomkrit | Cloud & Infrastructure Architect"
      subtitle = "Fullstack Engineer / Consultant specializing in high-performance Backend and Enterprise Infrastructure."

      [[languages.th.menu.main]]
      name = "Case Studies"
      url = "/case-studies/"
      weight = 1

    [[languages.th.params.profileMode.buttons]]
          name = "View Case Studies"
          url = "/case-studies/"
    [[languages.th.params.profileMode.buttons]]
          name = "Blogs"
          url = "/blogs/"
    [[languages.th.params.profileMode.buttons]]
          name = "Github"
          url = "https://github.com/azimuth3d"
